name: lunaratlas
channels:
  - conda-forge
  - defaults
dependencies:
  # ── Python version ────────────────────────────────────────────────────────
  - python=3.11

  # ── Core scientific stack ─────────────────────────────────────────────────
  - numpy>=1.24.0
  - pandas>=2.0.0
  - scipy>=1.11.0
  - matplotlib>=3.7.0
  - lxml>=4.9.0

  # ── Database ──────────────────────────────────────────────────────────────
  - psycopg2>=2.9.0

  # ── Testing ───────────────────────────────────────────────────────────────
  - pytest>=7.4.0
  - pytest-cov>=4.1.0

  # ── Pip-only packages ─────────────────────────────────────────────────────
  - pip:
    - reportlab>=4.0.0
    - fastapi>=0.104.0
    - uvicorn[standard]>=0.24.0
    - databases[asyncpg]>=0.8.0
    - redis>=5.0.0
    - python-dotenv>=1.0.0
    - pydantic>=2.0.0
