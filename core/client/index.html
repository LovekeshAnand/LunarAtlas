<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LunarAtlas — Chandrayaan-3 LIBS Spectral Analysis</title>
    <!--
      FOUC prevention: applies .dark to <html> BEFORE any CSS or React
      loads, so there is never a flash of the wrong colour scheme.
    -->
    <script>
      try {
        var saved = localStorage.getItem('luna-theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (saved === 'dark' || (!saved && prefersDark)) {
          document.documentElement.classList.add('dark');
        }
      } catch (_) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
