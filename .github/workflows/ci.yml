name: LunarAtlas CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline tests (no DB required)
        run: pytest tests/test_pipeline_processing.py -v

      - name: Run LTTB algorithm tests
        run: pytest tests/test_lttb_algorithm.py -v
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Generate coverage report
        run: |
          pip install pytest-cov
          pytest tests/ --cov=Pipeline --cov=core/server/app/core \
            --cov-report=term-missing \
            --ignore=tests/main-algo \
            --ignore=tests/test-algo \
            -v || true
